<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Quiz Game</title>
        <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <div id="quiz-container">
            <div id="start-screen" class="screen">
                <h1>Quiz <span>Game</span></h1>
                <p>Test your knowledge. 5 questions. Let's go.</p>
                <button id="start-btn">Start Quiz →</button>
            </div>
            <div id="question-screen" class="screen hidden">
                <div class="quiz-header">
                    <span class="quiz-label">Quiz Game</span>
                    <span id="progress-text"></span>
                </div>
                <div id="progress-bar-wrap">
                    <div id="progress-bar"></div>
                </div>
                <p id="question-text"></p>
                <div id="options">
                </div>
                <div id="score-display">
                    Score: <span id="score">0</span>
                </div>
            </div>
            <div id="results-screen" class="screen hidden">
                <p class="result-label">Your result</p>
                <div class="big-score" id="final-score">0/5</div>
                <p class="result-message" id="result-message">Well done!</p>
                <button id="restart-btn">Play Again →</button>
            </div>
        </div>
        <script src="script.js"></script>
    </body>
</html>
